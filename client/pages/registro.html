<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinica - Registro de Usuario</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <span class="navbar-brand">Gestion Clinica</span>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-body p-4">
              <h4 class="card-title mb-4">Registrar Usuario</h4>

              <div id="error-msg" class="alert alert-danger d-none"></div>
              <div id="success-msg" class="alert alert-success d-none"></div>

              <form id="registro-form">
                <div class="mb-3">
                  <label for="nombre" class="form-label">Nombre</label>
                  <input
                    type="text"
                    class="form-control"
                    id="nombre"
                    placeholder="Nombre completo"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Correo Electronico"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Contrasena</label>
                  <div class="input-group">
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      placeholder="Contrasena"
                      required
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="toggle-password"
                    >
                      <i class="bi bi-eye" id="icono-ojo"></i>
                    </button>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="rol" class="form-label">Rol</label>
                  <select class="form-select" id="rol" required>
                    <option value="">Selecciona un rol</option>
                    <option value="medico">Medico</option>
                    <option value="recepcionista">Recepcionista</option>
                  </select>
                </div>

                <div class="d-flex justify-content-between mt-2">
                  <button
                    type="button"
                    class="btn btn-secondary"
                    id="btn-volver"
                  >
                    Volver
                  </button>
                  <button type="submit" class="btn btn-primary">
                    Registrar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/registro.js"></script>
  </body>
</html>
