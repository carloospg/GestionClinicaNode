<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinica - Citas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <div id="navbar-container"></div>

  <div class="container mt-4">
    <div class="row mb-3">
      <div class="col">
        <h4>Gestion de Citas</h4>
        <p class="text-muted">Lista de todas las citas del sistema</p>
      </div>
      <div class="col-auto">
        <button class="btn btn-primary" id="btn-nueva-cita">
          <i class="bi bi-calendar-plus me-1"></i> Nueva Cita
        </button>
      </div>
    </div>

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <div class="card shadow">
      <div class="card-body">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Paciente</th>
              <th>Medico</th>
              <th>Fecha y Hora</th>
              <th>Motivo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-citas"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal crear cita -->
  <div class="modal fade" id="modal-cita" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nueva Cita</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="modal-error" class="alert alert-danger d-none"></div>
          <div class="mb-3">
            <label class="form-label">Paciente</label>
            <select class="form-select" id="select-paciente" required>
              <option value="">Selecciona un paciente</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Medico</label>
            <select class="form-select" id="select-medico" required>
              <option value="">Selecciona un medico</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Fecha y Hora</label>
            <input type="datetime-local" class="form-control" id="input-fecha" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Motivo</label>
            <input type="text" class="form-control" id="input-motivo" placeholder="Motivo de la cita" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-guardar-cita">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/citas.js"></script>
</body>
</html>
