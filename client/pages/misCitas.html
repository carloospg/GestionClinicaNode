<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinica - Mis Citas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <div id="navbar-container"></div>

  <!-- Contenedor de notificaciones -->
  <div id="contenedor-notificaciones"
    style="position: fixed; top: 70px; right: 20px; z-index: 9999; width: 350px;">
  </div>

  <div class="container mt-4">
    <div class="row mb-3">
      <div class="col">
        <h4>Mis Citas</h4>
        <p class="text-muted">Lista de tus citas asignadas</p>
      </div>
    </div>

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <div class="card shadow">
      <div class="card-body">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Paciente</th>
              <th>Fecha y Hora</th>
              <th>Motivo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-mis-citas"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal finalizar cita -->
  <div class="modal fade" id="modal-finalizar" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Finalizar Cita</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="modal-error" class="alert alert-danger d-none"></div>
          <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea class="form-control" id="input-observaciones" rows="3" placeholder="Observaciones de la consulta" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Diagnostico</label>
            <input type="text" class="form-control" id="input-diagnostico" placeholder="Diagnostico" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Tratamiento</label>
            <textarea class="form-control" id="input-tratamiento" rows="2" placeholder="Tratamiento indicado" required></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-success" id="btn-confirmar-finalizar">Finalizar Cita</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="../js/misCitas.js"></script>
</body>
</html>
