<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinica - Panel Principal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div id="navbar-container"></div>
    <div
      id="contenedor-notificaciones"
      style="
        position: fixed;
        top: 70px;
        right: 20px;
        z-index: 9999;
        width: 350px;
      "
    ></div>

    <div class="container mt-4">
      <div class="row mb-3">
        <div class="col">
          <h4>Panel Principal</h4>
          <p class="text-muted" id="bienvenida"></p>
        </div>
      </div>

      <!-- Panel Admin -->
      <div id="panel-admin" class="d-none">
        <div class="row g-3 mb-4">
          <div class="col-md-3">
            <div class="card shadow text-center">
              <div class="card-body">
                <i class="bi bi-people-fill fs-1 text-primary"></i>
                <h5 class="mt-2">Usuarios</h5>
                <h2 id="total-usuarios">-</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card shadow text-center">
              <div class="card-body">
                <i class="bi bi-person-vcard-fill fs-1 text-success"></i>
                <h5 class="mt-2">Pacientes</h5>
                <h2 id="total-pacientes">-</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card shadow text-center">
              <div class="card-body">
                <i class="bi bi-calendar-check-fill fs-1 text-warning"></i>
                <h5 class="mt-2">Citas Hoy</h5>
                <h2 id="citas-hoy">-</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card shadow text-center">
              <div class="card-body">
                <i class="bi bi-person-badge-fill fs-1 text-info"></i>
                <h5 class="mt-2">Medicos</h5>
                <h2 id="total-medicos">-</h2>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Panel Medico -->
      <div id="panel-medico" class="d-none">
        <div class="card shadow mb-4">
          <div
            class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
          >
            <span
              ><i class="bi bi-calendar-check me-2"></i>Mis citas pendientes
              hoy</span
            >
            <span class="badge bg-light text-dark" id="contador-citas-medico"
              >0</span
            >
          </div>
          <div class="card-body">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Paciente</th>
                  <th>Hora</th>
                  <th>Motivo</th>
                </tr>
              </thead>
              <tbody id="tabla-citas-medico"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Panel Recepcionista -->
      <div id="panel-recepcionista" class="d-none">
        <div class="card shadow mb-4">
          <div
            class="card-header bg-success text-white d-flex justify-content-between align-items-center"
          >
            <span
              ><i class="bi bi-calendar-check me-2"></i>Citas pendientes
              hoy</span
            >
            <span
              class="badge bg-light text-dark"
              id="contador-citas-recepcionista"
              >0</span
            >
          </div>
          <div class="card-body">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Paciente</th>
                  <th>Medico</th>
                  <th>Hora</th>
                  <th>Motivo</th>
                </tr>
              </thead>
              <tbody id="tabla-citas-recepcionista"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="../js/index.js"></script>
  </body>
</html>
