<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinica - Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <div id="navbar-container"></div>

  <div class="container mt-4">
    <div class="row mb-3">
      <div class="col">
        <h4>Gestion de Usuarios</h4>
        <p class="text-muted">Lista de todos los usuarios del sistema</p>
      </div>
      <div class="col-auto">
        <a href="registro.html" class="btn btn-primary">
          <i class="bi bi-person-plus me-1"></i> Registrar Usuario
        </a>
      </div>
    </div>

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <div class="card shadow">
      <div class="card-body">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-usuarios"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal editar rol -->
  <div class="modal fade" id="modal-editar" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modificar Rol</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <label for="select-rol" class="form-label">Selecciona el nuevo rol</label>
          <select class="form-select" id="select-rol">
            <option value="admin">Admin</option>
            <option value="medico">Medico</option>
            <option value="recepcionista">Recepcionista</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-guardar-rol">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/usuarios.js"></script>
</body>
</html>
