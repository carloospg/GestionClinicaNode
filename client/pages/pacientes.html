<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinica - Pacientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <div id="navbar-container"></div>

  <div class="container mt-4">
    <div class="row mb-3">
      <div class="col">
        <h4>Gestion de Pacientes</h4>
        <p class="text-muted">Lista de todos los pacientes del sistema</p>
      </div>
      <div class="col-auto">
        <button class="btn btn-primary" id="btn-nuevo-paciente">
          <i class="bi bi-person-plus me-1"></i> Nuevo Paciente
        </button>
      </div>
    </div>

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <div class="card shadow">
      <div class="card-body">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Apellidos</th>
              <th>DNI</th>
              <th>Telefono</th>
              <th>Fecha Nacimiento</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-pacientes"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal crear paciente -->
  <div class="modal fade" id="modal-paciente" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nuevo Paciente</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="modal-error" class="alert alert-danger d-none"></div>
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" id="input-nombre" placeholder="Nombre" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Apellidos</label>
            <input type="text" class="form-control" id="input-apellidos" placeholder="Apellidos" required />
          </div>
          <div class="mb-3">
            <label class="form-label">DNI</label>
            <input type="text" class="form-control" id="input-dni" placeholder="12345678A" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Telefono</label>
            <input type="text" class="form-control" id="input-telefono" placeholder="666777888" />
          </div>
          <div class="mb-3">
            <label class="form-label">Fecha de Nacimiento</label>
            <input type="date" class="form-control" id="input-fecha" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-guardar-paciente">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/pacientes.js"></script>
</body>
</html>
