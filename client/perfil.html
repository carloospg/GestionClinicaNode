<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinica - Perfil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <span class="navbar-brand">Gestion Clinica</span>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-body p-4">
              <h4 class="card-title mb-4">Mi Perfil</h4>

              <div class="mb-3">
                <label class="form-label text-muted">Nombre</label>
                <p id="perfil-nombre" class="fs-5 fw-bold"></p>
              </div>

              <div class="mb-3">
                <label class="form-label text-muted">Email</label>
                <p id="perfil-email" class="fs-5"></p>
              </div>

              <div class="mb-3">
                <label class="form-label text-muted">Rol</label>
                <p id="perfil-rol" class="fs-5"></p>
              </div>

              <div class="d-flex justify-content-between mt-2">
                <button id="btn-logout" class="btn btn-danger">
                  Cerrar sesion
                </button>
                <button id="btn-registro" class="btn btn-primary d-none">
                  Registrar usuario
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/perfil.js"></script>
  </body>
</html>
